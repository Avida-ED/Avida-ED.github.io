name: Accessibility smoke test

on:
  pull_request:

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Serve site
        run: |
          npx docusaurus serve --dir build --port 3000 --no-open &
          sleep 2

      - name: Run pa11y-ci
        run: |
          npx pa11y-ci --config .pa11yci.json


